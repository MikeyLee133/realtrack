# nginx server block for RealTrack — serves the static build under a subdomain
# on the same Droplet as your main site. Install:
#   sudo cp deploy/nginx/realtrack.mikeylee.io.conf /etc/nginx/sites-available/realtrack
#   sudo ln -s /etc/nginx/sites-available/realtrack /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Then get HTTPS with:  sudo certbot --nginx -d realtrack.mikeylee.io
# (certbot rewrites this file to add the :443 server + an http->https redirect.)

server {
    listen 80;
    listen [::]:80;
    server_name realtrack.mikeylee.io;

    # Where the contents of the app's dist/ folder are uploaded.
    root /var/www/realtrack;
    index index.html;

    # Serve files if present; fall back to index.html. Harmless today (the app
    # has no client-side routing yet) and future-proofs deep links if it does.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # The build's asset filenames are content-hashed, so cache them forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache the HTML entry point, so a new deploy is picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
